name: release

# Triggered by `scripts/release.py` pushing a `vX.Y.Z` tag. Verifies the tag
# matches pyproject, builds the wheel + sdist, publishes them to PyPI via
# trusted publishing (OIDC — no stored token), and creates a GitHub release.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing to PyPI (OIDC)
      contents: write   # create the GitHub release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify the tag matches pyproject version
        run: |
          python - <<'PY'
          import os, pathlib, tomllib
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if tag != version:
              raise SystemExit(f"tag {tag!r} does not match pyproject version {version!r}")
          print(f"tag and version agree: {version}")
          PY

      - name: Build the wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@v1.14.0

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
